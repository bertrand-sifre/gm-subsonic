# Environnement de DÉVELOPPEMENT pour le monorepo Nx vdm-subsonic.
# - le dépôt est monté en bind-mount dans /app ;
# - node_modules vit dans un volume Docker (Linux) pour NE PAS écraser/être
#   écrasé par le node_modules de l'hôte macOS arm64 (binaires incompatibles) ;
# - web (Vite, 5173) et serveur (Hono, 8787) tournent dans le même conteneur
#   via `npm run dev` (nx run-many serve), donc le proxy /api -> localhost:8787
#   du front fonctionne tel quel.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vdm-subsonic-dev
    # 1) installe les deps si le volume node_modules est vide (1er run) ;
    # 2) importe la bibliothèque (décode les nouveaux fichiers de library/,
    #    incrémental donc rapide) ; 3) lance le dev. `exec` pour que les signaux
    #    (Ctrl+C) atteignent npm/nx. Le `;` (et non `&&`) garantit que le dev
    #    démarre même si l'import échoue.
    command: ["sh", "-c", "[ -d node_modules/.bin ] || npm install; npm run library:import; exec npm run dev"]
    working_dir: /app
    ports:
      - "5173:5173" # Vite (front Svelte)
      - "8787:8787" # Hono (API)
    volumes:
      # Code source en bind-mount (édition à chaud depuis l'hôte).
      - .:/app
      # node_modules racine : volume nommé Linux, jamais le node_modules de l'hôte.
      - vdm_node_modules:/app/node_modules
      # Volumes anonymes pour masquer d'éventuels node_modules d'espace de travail
      # créés côté hôte (binaires macOS) — défense en profondeur.
      - /app/apps/web/node_modules
      - /app/apps/server/node_modules
      - /app/libs/shared/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true # file-watching fiable sur bind-mount
      - NX_DAEMON=false
    init: true        # PID 1 propre (reaping des process tsx/vite enfants)
    stdin_open: true
    tty: true

volumes:
  vdm_node_modules:
