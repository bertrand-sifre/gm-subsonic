# Build (et publication) de l'image conteneur via Nx + @nx-tools/nx-container.
# La cible `container` du projet `server` (apps/server/project.json) délègue à
# l'exécuteur `@nx-tools/nx-container:build` qui pilote buildx. Les tags/labels
# OCI sont dérivés de l'option `metadata` de la cible (même moteur que
# docker/metadata-action) à partir du contexte GITHUB_* fourni par le runner.
name: container

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Permet à GITHUB_TOKEN de publier sur le GitHub Container Registry (ghcr.io).
permissions:
  contents: read
  packages: write

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # nx a besoin de l'historique pour `affected` / les métadonnées de tag.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # buildx (+ QEMU au cas où on étendrait `platforms` au-delà de amd64).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Connexion à ghcr.io — sautée sur les PR (forks sans secret d'écriture).
      - name: Login GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build sur PR (load local, pas de push), build + push sur main / tags.
      # Cache de couches via GitHub Actions (accélère les builds successifs).
      - name: Build container
        run: |
          npx nx run server:container \
            ${{ github.event_name != 'pull_request' && '--push' || '--load' }} \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max
        env:
          # Le moteur de metadata de nx-container lit le token via
          # core.getInput('github-token') -> env INPUT_GITHUB_TOKEN (et NON
          # GITHUB_TOKEN). Il sert à lire les infos du repo (labels OCI +
          # branche par défaut pour {{is_default_branch}}). On y passe le token
          # AUTO-FOURNI par Actions — pas besoin d'un PAT/secret dédié.
          INPUT_GITHUB_TOKEN: ${{ github.token }}
